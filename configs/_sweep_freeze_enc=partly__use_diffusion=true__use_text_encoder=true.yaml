seed: 42
dataset: crag
hf:
  token: ${hf_token}
paths:
  data_root: /home/nhanph/Workspace/AIVN Research/Self_Supervised/Research/dataset/crag/dataset_10
  checkpoint_dir: ./outputs/checkpoints/crag/freeze_enc=partly__use_diffusion=true__use_text_encoder=true
  log_dir: ./outputs/logs/crag/freeze_enc=partly__use_diffusion=true__use_text_encoder=true
patch:
  size: 256
  crop_retry: 3
  min_fg_ratio: 0.03
diffusion:
  T: 100
  base_ch: 64
  batch_size: 4
  lr: 0.0002
  depth: 4
segmentation:
  decoder: deeplabv3
  aspp:
    aspp_out: 256
    rates:
    - 6
    - 12
    - 18
  batch_size: 4
  val_batch_size: 8
  accum_steps: 1
  grad_checkpointing: false
  lr: 1.0e-05
  lr_unfrozen: 5.0e-06
  freeze_enc: partly
  max_repeat: 10
loss:
  lambda_pseudo: 0.3
  lambda_view: 0.3
  lambda_bound: 0.5
  lambda_cldice: 0.5
  lambda_bce: 1.0
  lambda_dice: 1.0
  tau_max: 0.9
  tau_min: 0.7
train:
  epochs: 100
  warmup_epochs: 10
  patience: 30
  noise_frac: 0.4
  grad_clip: 1.0
  num_workers: 2
  is_warmup: true
  use_diffusion: true
text:
  use_text_encoder: true
  prompt_template: a histopathology image of {class_name}
  class_names:
  - gland
  - background
  - lumen
infer:
  patch_size: 256
  stride: 128
