seed: 42

dataset: crag

hf:
  token: "${hf_token}"

paths:
  data_root: /home/nhanph/Workspace/AIVN Research/Self_Supervised/Research/dataset/crag/dataset_10
  checkpoint_dir: ./outputs/checkpoints/crag
  log_dir: ./outputs/logs/crag

patch:
  size: 256
  crop_retry: 3
  min_fg_ratio: 0.03

diffusion:
  T: 100
  base_ch: 64
  batch_size: 4
  lr: 2.0e-4
  depth: 4

segmentation:
  decoder: deeplabv3
  aspp:
    aspp_out: 256
    rates: [6, 12, 18]
  batch_size: 4
  val_batch_size: 8
  accum_steps: 1
  grad_checkpointing: false
  lr: 1.0e-5
  lr_unfrozen: 5.0e-6
  # false    – encoder never frozen
  # "partly" – frozen during warmup, unfrozen after (requires is_warmup: true)
  # true     – encoder frozen for the whole training
  freeze_enc: "partly"
  max_repeat: 10
  use_pyramid_feature: false

loss:
  lambda_pseudo: 0.3
  lambda_view: 0.3
  lambda_bound: 0.5
  lambda_cldice: 0.5
  lambda_bce: 1.0
  lambda_dice: 1.0
  tau_max: 0.9
  tau_min: 0.7
  cldice_iters: 3

train:
  epochs: 100
  warmup_epochs: 10
  patience: 30
  noise_frac: 0.4
  grad_clip: 1.0
  num_workers: 2
  is_warmup: true
  # use diffusion model to generate refined pseudo-labels for loss_unsup;
  # if false, loss_unsup falls back to view-consistency loss on unlabeled images
  use_diffusion: true
  # EMA (Mean Teacher): pseudo-labels are generated by a time-averaged copy of
  # the model (ema_model) instead of the current student. This stabilises the
  # pseudo-label target and avoids the moving-target problem.
  # Set false to revert to student-generated pseudo-labels.
  use_ema_teacher: true
  ema_alpha: 0.999        # weight of old teacher; higher = slower update
  # pseudo-label ablation (only when use_diffusion: true):
  #   strong_weak   – strong logits vs refined weak mask (FixMatch, default)
  #   weak_weak     – weak logits vs refined weak mask (DiffRect L_Rect)
  #   strong_strong – strong logits vs refined strong mask (self-distillation)
  #   diffrect      – weak_weak + strong_weak combined
  pseudo_ablation: strong_weak

text:
  # Set false to disable CONCH text encoder and TextGuidedFusion entirely.
  # Tokens from the image encoder are passed straight to the decoder.
  use_text_encoder: false
  prompt_template: "a histopathology image of {class_name}"
  class_names:
    - gland
    - background
    - lumen
infer:
  patch_size: 256
  stride: 128
