seed: 42
dataset: glas
hf:
  token: ${hf_token}
paths:
  data_root: /home/nhanph/Workspace/AIVN Research/Self_Supervised/Research/dataset/glas/dataset_10
  checkpoint_dir: ./outputs/checkpoints/glas/consistency_type__use_diffusion__20260611_160416/consistency_type=combined__use_diffusion=false
  log_dir: ./outputs/logs/glas/consistency_type__use_diffusion__20260611_160416/consistency_type=combined__use_diffusion=false
patch:
  size: 256
  crop_retry: 1
  min_fg_ratio: 0.0
diffusion:
  T: 100
  base_ch: 64
  batch_size: 4
  lr: 0.0001
  weight_decay: 0.001
  depth: 4
segmentation:
  decoder: deeplabv3
  aspp:
    aspp_out: 256
    rates:
    - 6
    - 12
    - 18
  batch_size: 4
  val_batch_size: 4
  accum_steps: 1
  grad_checkpointing: false
  lr: 0.0001
  weight_decay: 0.001
  lr_unfrozen: 1.0e-05
  weight_decay_unfrozen: 0.0001
  freeze_enc: partly
  max_repeat: 10
  use_pyramid_feature: false
loss:
  lambda_pseudo: 0.1
  lambda_view: 0.1
  lambda_bound: 0.5
  lambda_cldice: 1.0
  lambda_bce: 1.0
  lambda_dice: 1.0
  cldice_iters: 3
  consistency_type: combined
  lambda_soft: 0.9
  tau_max: 0.95
  tau_min: 0.7
  conf_strict_epochs: 5
  keep_frac_min: 0.1
  keep_frac_max: 0.6
train:
  epochs: 100
  warmup_epochs: 10
  patience: 25
  noise_frac: 0.4
  grad_clip: 1.0
  num_workers: 2
  is_warmup: true
  use_diffusion: false
  use_ema_teacher: true
  ema_alpha: 0.999
  pseudo_ablation: diffrect
text:
  use_text_encoder: false
  prompt_template: a histopathology image of {class_name}
  class_names:
  - gland
  - background
  - lumen
infer:
  patch_size: 256
  stride: 128
